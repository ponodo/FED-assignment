
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>HawkerHub - Create Rental Agreement</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- HawkerHub Styles -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar bg-white border-bottom">
      <div class="container">
        <a
          class="navbar-brand fw-bold text-danger"
          href="index.html"
        >
          <i class="bi bi-shop-window me-2"></i>
          HawkerHub
        </a>

        <a
          class="btn btn-outline-danger"
          href="rental-agreements.html"
        >
          <i class="bi bi-arrow-left me-1"></i>
          Back to Agreements
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <h1 class="fw-bold text-danger mb-4">
            Create Rental Agreement
          </h1>

          <div class="card shadow-sm">
            <div class="card-header bg-danger text-white fw-bold">
              <i class="bi bi-file-earmark-text me-2"></i>
              Rental Agreement Details
            </div>

            <div class="card-body">
              <form id="createAgreementForm">
                <!-- Stall ID -->
                <div class="mb-3">
                  <label
                    for="stallId"
                    class="form-label fw-semibold"
                  >
                    Stall ID
                    <span class="text-danger">*</span>
                  </label>

                  <input
                    type="text"
                    id="stallId"
                    class="form-control"
                    placeholder="Enter Stall ID"
                    required
                  />
                </div>

                <!-- Stall Name -->
                <div class="mb-3">
                  <label
                    for="stallName"
                    class="form-label fw-semibold"
                  >
                    Stall Name
                    <span class="text-danger">*</span>
                  </label>

                  <input
                    type="text"
                    id="stallName"
                    class="form-control"
                    placeholder="e.g. Tian Tian Chicken Rice"
                    required
                  />
                </div>

                <!-- Hawker Centre -->
                <div class="mb-3">
                  <label
                    for="hawkerCenter"
                    class="form-label fw-semibold"
                  >
                    Hawker Centre
                    <span class="text-danger">*</span>
                  </label>

                  <input
                    type="text"
                    id="hawkerCenter"
                    class="form-control"
                    placeholder="e.g. Maxwell Food Centre"
                    required
                  />
                </div>

                <!-- Stall Size and Monthly Rent -->
                <div class="row">
                  <div class="col-12 col-md-6 mb-3">
                    <label
                      for="stallSize"
                      class="form-label fw-semibold"
                    >
                      Stall Size (sq ft)
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="number"
                      id="stallSize"
                      class="form-control"
                      placeholder="e.g. 150"
                      min="1"
                      step="1"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6 mb-3">
                    <label
                      for="monthlyRent"
                      class="form-label fw-semibold"
                    >
                      Monthly Rent ($)
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="number"
                      id="monthlyRent"
                      class="form-control"
                      placeholder="Enter monthly rent"
                      min="0.01"
                      step="0.01"
                      required
                    />
                  </div>
                </div>

                <!-- Agreement Dates -->
                <div class="row">
                  <div class="col-12 col-md-6 mb-3">
                    <label
                      for="startDate"
                      class="form-label fw-semibold"
                    >
                      Start Date
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="date"
                      id="startDate"
                      class="form-control"
                      required
                    />
                  </div>

                  <div class="col-12 col-md-6 mb-3">
                    <label
                      for="endDate"
                      class="form-label fw-semibold"
                    >
                      End Date
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="date"
                      id="endDate"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <!-- Information Notice -->
                <div class="alert alert-warning small">
                  <i class="bi bi-info-circle me-1"></i>
                  Monthly payment records will be generated automatically
                  from the agreement start date to the end date.
                </div>

                <!-- Buttons -->
                <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                  <button
                    type="submit"
                    class="btn btn-danger px-4"
                  >
                    <i class="bi bi-check-circle me-1"></i>
                    Create Agreement
                  </button>

                  <a
                    href="rental-agreements.html"
                    class="btn btn-outline-secondary px-4"
                  >
                    Cancel
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
      <small>
        © 2026 HawkerHub. All rights reserved.
      </small>
    </footer>

    <!-- Firebase + Firestore -->
    <script type="module">
      import {
        initializeApp
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";

      import {
        getFirestore,
        collection,
        addDoc
      } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBazksxHfRgOJcraIVqslvCWqZT4qjTWZE",
        authDomain: "hawkerhub-b4a7a.firebaseapp.com",
        projectId: "hawkerhub-b4a7a",
        storageBucket: "hawkerhub-b4a7a.appspot.com",
        messagingSenderId: "43569063246",
        appId: "1:43569063246:web:9d18d5107d2081784e2a1f"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const form = document.getElementById("createAgreementForm");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const user = JSON.parse(
          localStorage.getItem("hawkerhub_user")
        );

        if (!user || user.role !== "vendor") {
          alert("You must be logged in as a vendor.");
          window.location.href = "login.html";
          return;
        }

        const stallId = document
          .getElementById("stallId")
          .value
          .trim();

        const stallName = document
          .getElementById("stallName")
          .value
          .trim();

        const hawkerCenter = document
          .getElementById("hawkerCenter")
          .value
          .trim();

        const stallSize = Number.parseInt(
          document.getElementById("stallSize").value,
          10
        );

        const monthlyRent = Number.parseFloat(
          document.getElementById("monthlyRent").value
        );

        const startDate = document
          .getElementById("startDate")
          .value;

        const endDate = document
          .getElementById("endDate")
          .value;

        if (
          !stallId ||
          !stallName ||
          !hawkerCenter ||
          Number.isNaN(stallSize) ||
          Number.isNaN(monthlyRent) ||
          !startDate ||
          !endDate
        ) {
          alert("Please fill in all fields correctly.");
          return;
        }

        if (stallSize <= 0) {
          alert("Stall size must be greater than 0.");
          return;
        }

        if (monthlyRent <= 0) {
          alert("Monthly rent must be greater than $0.");
          return;
        }

        if (new Date(endDate) < new Date(startDate)) {
          alert("End date cannot be earlier than the start date.");
          return;
        }

        try {
          const agreementRef = await addDoc(
            collection(db, "rentalAgreements"),
            {
              vendorId: user.vendorId,
              stallId,
              stallName,
              hawkerCenter,
              stallSize,
              monthlyRent,
              startDate,
              endDate,
              status: "active",
              createdAt: new Date()
            }
          );

          const paymentDate = new Date(`${startDate}T00:00:00`);
          const agreementEndDate = new Date(`${endDate}T00:00:00`);

          while (paymentDate <= agreementEndDate) {
            const dueDate =
              `${paymentDate.getFullYear()}-` +
              `${String(paymentDate.getMonth() + 1).padStart(2, "0")}-05`;

            await addDoc(
              collection(db, "payments"),
              {
                vendorId: user.vendorId,
                agreementId: agreementRef.id,
                stallId,
                stallName,
                amount: monthlyRent,
                dueDate,
                status: "pending",
                paymentDate: null
              }
            );

            paymentDate.setMonth(paymentDate.getMonth() + 1);
          }

          alert("Rental agreement created successfully!");
          window.location.href = "rental-agreements.html";
        } catch (error) {
          console.error("Error creating rental agreement:", error);

          alert(
            "Failed to create agreement.\n" +
            error.message
          );
        }
      });
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
