
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <title>HawkerHub - My Profile</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar bg-white border-bottom py-3">
      <div class="container">
        <a
          class="navbar-brand text-danger fw-bold"
          href="index.html"
        >
          <i class="bi bi-shop-window me-2"></i>
          HawkerHub
        </a>

        <a
          href="customer-dashboard.html"
          class="btn btn-outline-danger"
        >
          <i class="bi bi-arrow-left me-1"></i>
          Back to Dashboard
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5 flex-grow-1">
      <div class="mb-4">
        <h1 class="fw-bold text-danger mb-2">
          My Profile
        </h1>

        <p class="text-secondary mb-0">
          View and update your personal information.
        </p>
      </div>

      <div class="row g-4">
        <!-- Profile Summary -->
        <div class="col-12 col-lg-4">
          <div class="card text-center shadow-sm h-100">
            <div class="card-header bg-danger text-white fw-bold">
              <i class="bi bi-person-circle me-2"></i>
              Profile Summary
            </div>

            <div class="card-body py-5">
              <div class="mb-3">
                <i
                  class="bi bi-person-circle display-1 text-danger"
                ></i>
              </div>

              <h2
                class="h4 fw-bold mb-2"
                id="profileName"
              >
                User
              </h2>

              <p
                class="text-secondary mb-1"
                id="profileEmail"
              ></p>

              <span
                class="badge bg-danger mt-2"
                id="profileRole"
              >
                Customer
              </span>

              <div class="mt-4">
                <button
                  class="btn btn-outline-danger btn-sm"
                  type="button"
                  id="changePhotoBtn"
                >
                  <i class="bi bi-camera me-1"></i>
                  Change Photo
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Edit Profile Form -->
        <div class="col-12 col-lg-8">
          <div class="card shadow-sm">
            <div class="card-header bg-danger text-white fw-bold">
              <i class="bi bi-pencil-square me-2"></i>
              Edit Profile Information
            </div>

            <div class="card-body">
              <form id="profileForm">
                <div class="row g-3">
                  <!-- First Name -->
                  <div class="col-12 col-md-6">
                    <label
                      for="firstName"
                      class="form-label fw-semibold"
                    >
                      First Name
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      id="firstName"
                      placeholder="Enter your first name"
                      maxlength="50"
                      required
                    />
                  </div>

                  <!-- Last Name -->
                  <div class="col-12 col-md-6">
                    <label
                      for="lastName"
                      class="form-label fw-semibold"
                    >
                      Last Name
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      id="lastName"
                      placeholder="Enter your last name"
                      maxlength="50"
                      required
                    />
                  </div>

                  <!-- Email -->
                  <div class="col-12">
                    <label
                      for="email"
                      class="form-label fw-semibold"
                    >
                      Email Address
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      placeholder="Enter your email address"
                      required
                    />
                  </div>

                  <!-- Phone -->
                  <div class="col-12">
                    <label
                      for="phone"
                      class="form-label fw-semibold"
                    >
                      Phone Number
                    </label>

                    <input
                      type="tel"
                      class="form-control"
                      id="phone"
                      placeholder="e.g. 91234567"
                      maxlength="8"
                      pattern="[689][0-9]{7}"
                    />

                    <div class="form-text">
                      Enter an 8-digit Singapore phone number.
                    </div>
                  </div>

                  <!-- Address -->
                  <div class="col-12">
                    <label
                      for="address"
                      class="form-label fw-semibold"
                    >
                      Address
                    </label>

                    <textarea
                      class="form-control"
                      id="address"
                      rows="4"
                      placeholder="Enter your address"
                      maxlength="250"
                    ></textarea>
                  </div>
                </div>

                <div class="alert alert-warning small mt-4">
                  <i class="bi bi-info-circle me-1"></i>
                  Your updated profile information will be saved on this device.
                </div>

                <div class="d-grid mt-4">
                  <button
                    type="submit"
                    class="btn btn-danger py-2 fw-bold"
                    id="saveProfileBtn"
                  >
                    <i class="bi bi-save me-1"></i>
                    Save Changes
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-0 small">
          © 2026 HawkerHub. All rights reserved.
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function getLoggedInUser() {
        const storedUser =
          localStorage.getItem("hawkerhub_user");

        if (!storedUser) {
          return null;
        }

        try {
          return JSON.parse(storedUser);
        } catch (error) {
          console.error(
            "Invalid user data in localStorage:",
            error
          );

          return null;
        }
      }

      function loadProfile() {
        const user = getLoggedInUser();

        if (!user) {
          window.location.href = "login.html";
          return;
        }

        const fullName =
          `${user.firstName || "User"} ${user.lastName || ""}`.trim();

        document.getElementById(
          "profileName"
        ).textContent = fullName;

        document.getElementById(
          "profileEmail"
        ).textContent =
          user.email || "No email provided";

        document.getElementById(
          "profileRole"
        ).textContent =
          user.role === "vendor"
            ? "Hawker Vendor"
            : "Customer";

        document.getElementById(
          "firstName"
        ).value = user.firstName || "";

        document.getElementById(
          "lastName"
        ).value = user.lastName || "";

        document.getElementById(
          "email"
        ).value = user.email || "";

        document.getElementById(
          "phone"
        ).value = user.phone || "";

        document.getElementById(
          "address"
        ).value = user.address || "";
      }

      document
        .getElementById("profileForm")
        .addEventListener(
          "submit",
          function (event) {
            event.preventDefault();

            const user = getLoggedInUser();

            if (!user) {
              window.location.href = "login.html";
              return;
            }

            const firstName =
              document
                .getElementById("firstName")
                .value
                .trim();

            const lastName =
              document
                .getElementById("lastName")
                .value
                .trim();

            const email =
              document
                .getElementById("email")
                .value
                .trim();

            const phone =
              document
                .getElementById("phone")
                .value
                .trim();

            const address =
              document
                .getElementById("address")
                .value
                .trim();

            if (!firstName || !lastName || !email) {
              alert(
                "Please fill in your first name, last name and email address."
              );

              return;
            }

            if (
              phone &&
              !/^[689]\d{7}$/.test(phone)
            ) {
              alert(
                "Please enter a valid 8-digit Singapore phone number."
              );

              return;
            }

            const updatedUser = {
              ...user,
              firstName,
              lastName,
              email,
              phone,
              address
            };

            localStorage.setItem(
              "hawkerhub_user",
              JSON.stringify(updatedUser)
            );

            const users =
              JSON.parse(
                localStorage.getItem(
                  "hawkerhub_users"
                )
              ) || [];

            const userIndex =
              users.findIndex(
                (storedUser) =>
                  storedUser.id === updatedUser.id
              );

            if (userIndex > -1) {
              users[userIndex] = {
                ...users[userIndex],
                ...updatedUser
              };

              localStorage.setItem(
                "hawkerhub_users",
                JSON.stringify(users)
              );
            }

            alert(
              "Profile updated successfully!"
            );

            loadProfile();
          }
        );

      document
        .getElementById("changePhotoBtn")
        .addEventListener(
          "click",
          function () {
            alert(
              "Profile photo upload has not been implemented yet."
            );
          }
        );

      window.addEventListener(
        "DOMContentLoaded",
        loadProfile
      );
    </script>
  </body>
</html>
```
