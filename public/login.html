<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HawkerHub - Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar bg-white border-bottom py-3">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">
          <i class="bi bi-shop-window me-2"></i>
          HawkerHub
        </a>

        <a href="register.html" class="btn btn-outline-danger">
          <i class="bi bi-person-plus me-1"></i>
          Register
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="text-center mb-4">
            <h1 class="fw-bold text-danger mb-2">Welcome Back</h1>

            <p class="text-secondary mb-0">Log in to your HawkerHub account.</p>
          </div>

          <div class="card shadow-sm">
            <div class="card-header bg-danger text-white fw-bold">
              <i class="bi bi-box-arrow-in-right me-2"></i>
              Login
            </div>

            <div class="card-body p-4">
              <form id="loginForm">
                <!-- Email -->
                <div class="mb-3">
                  <label for="email" class="form-label fw-semibold">
                    Email Address
                    <span class="text-danger">*</span>
                  </label>

                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="Enter your email address"
                    autocomplete="email"
                    required
                  />
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label for="password" class="form-label fw-semibold">
                    Password
                    <span class="text-danger">*</span>
                  </label>

                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      placeholder="Enter your password"
                      autocomplete="current-password"
                      required
                    />

                    <button
                      type="button"
                      class="btn btn-outline-secondary"
                      id="togglePassword"
                      aria-label="Show or hide password"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <!-- Error Message -->
                <div
                  class="alert alert-danger d-none"
                  id="loginError"
                  role="alert"
                ></div>

                <!-- Login Button -->
                <div class="d-grid mt-4">
                  <button
                    type="submit"
                    class="btn btn-danger btn-lg"
                    id="loginButton"
                  >
                    <i class="bi bi-box-arrow-in-right me-2"></i>
                    Login
                  </button>
                </div>
              </form>

              <div class="text-center mt-4">
                <p class="mb-0">
                  Do not have an account?

                  <a
                    href="register.html"
                    class="text-danger fw-bold text-decoration-none"
                  >
                    Register here
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-0 small">© 2026 HawkerHub. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const loginForm = document.getElementById("loginForm");

      const loginButton = document.getElementById("loginButton");

      const loginError = document.getElementById("loginError");

      const passwordInput = document.getElementById("password");

      const togglePasswordButton = document.getElementById("togglePassword");

      togglePasswordButton.addEventListener("click", function () {
        const isHidden = passwordInput.type === "password";

        passwordInput.type = isHidden ? "text" : "password";

        togglePasswordButton.innerHTML = isHidden
          ? '<i class="bi bi-eye-slash"></i>'
          : '<i class="bi bi-eye"></i>';
      });

      function showError(message) {
        loginError.textContent = message;
        loginError.classList.remove("d-none");
      }

      function hideError() {
        loginError.textContent = "";
        loginError.classList.add("d-none");
      }

      loginForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        hideError();

        const email = document
          .getElementById("email")
          .value.trim()
          .toLowerCase();

        const password = passwordInput.value;

        if (!email || !password) {
          showError("Please enter your email address and password.");

          return;
        }

        loginButton.disabled = true;

        loginButton.innerHTML = `
            <span
              class="spinner-border spinner-border-sm me-2"
              role="status"
            ></span>
            Logging in...
          `;

        try {
          const response = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            showError(data.error || "Incorrect email address or password.");

            return;
          }

          localStorage.setItem("hawkerhub_token", data.token);

          localStorage.setItem("hawkerhub_user", JSON.stringify(data.user));

          if (data.user.role === "vendor") {
            window.location.href = "vendor-dashboard.html";
          } else {
            window.location.href = "customer-dashboard.html";
          }
        } catch (error) {
          console.error("Login error:", error);

          showError("Unable to reach the server. Please try again.");
        } finally {
          loginButton.disabled = false;

          loginButton.innerHTML = `
              <i class="bi bi-box-arrow-in-right me-2"></i>
              Login
            `;
        }
      });
    </script>
  </body>
</html>
