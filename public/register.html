<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HawkerHub - Register</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar bg-white border-bottom py-3">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">
          <i class="bi bi-shop-window me-2"></i>
          HawkerHub
        </a>

        <a href="login.html" class="btn btn-outline-danger">
          <i class="bi bi-box-arrow-in-right me-1"></i>
          Login
        </a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="container py-5 flex-grow-1">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="text-center mb-4">
            <h1 class="fw-bold text-danger mb-2">Create Your Account</h1>

            <p class="text-secondary mb-0">
              Register as a customer or hawker vendor.
            </p>
          </div>

          <div class="card shadow-sm">
            <div class="card-header bg-danger text-white fw-bold">
              <i class="bi bi-person-plus me-2"></i>
              Registration Details
            </div>

            <div class="card-body p-4">
              <!-- Role Selection -->
              <div class="mb-4">
                <label class="form-label fw-semibold">
                  Register as
                  <span class="text-danger">*</span>
                </label>

                <div
                  class="btn-group w-100"
                  role="group"
                  aria-label="Select account type"
                >
                  <input
                    type="radio"
                    class="btn-check"
                    name="role"
                    id="customer"
                    value="customer"
                    checked
                  />

                  <label class="btn btn-outline-danger py-3" for="customer">
                    <i class="bi bi-person me-2"></i>
                    Customer
                  </label>

                  <input
                    type="radio"
                    class="btn-check"
                    name="role"
                    id="vendor"
                    value="vendor"
                  />

                  <label class="btn btn-outline-danger py-3" for="vendor">
                    <i class="bi bi-shop me-2"></i>
                    Hawker Vendor
                  </label>
                </div>
              </div>

              <form id="registerForm">
                <div class="row g-3">
                  <!-- First Name -->
                  <div class="col-12 col-md-6">
                    <label for="firstName" class="form-label fw-semibold">
                      First Name
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      id="firstName"
                      placeholder="Enter your first name"
                      maxlength="50"
                      required
                    />
                  </div>

                  <!-- Last Name -->
                  <div class="col-12 col-md-6">
                    <label for="lastName" class="form-label fw-semibold">
                      Last Name
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="text"
                      class="form-control"
                      id="lastName"
                      placeholder="Enter your last name"
                      maxlength="50"
                      required
                    />
                  </div>

                  <!-- Email -->
                  <div class="col-12">
                    <label for="email" class="form-label fw-semibold">
                      Email Address
                      <span class="text-danger">*</span>
                    </label>

                    <input
                      type="email"
                      class="form-control"
                      id="email"
                      placeholder="Enter your email address"
                      required
                    />
                  </div>

                  <!-- Phone -->
                  <div class="col-12">
                    <label for="phone" class="form-label fw-semibold">
                      Phone Number
                    </label>

                    <input
                      type="tel"
                      class="form-control"
                      id="phone"
                      placeholder="e.g. 91234567"
                      maxlength="8"
                      pattern="[689][0-9]{7}"
                    />

                    <div class="form-text">
                      Enter an 8-digit Singapore phone number.
                    </div>
                  </div>

                  <!-- Password -->
                  <div class="col-12 col-md-6">
                    <label for="password" class="form-label fw-semibold">
                      Password
                      <span class="text-danger">*</span>
                    </label>

                    <div class="input-group">
                      <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="At least 6 characters"
                        minlength="6"
                        required
                      />

                      <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="togglePassword"
                        aria-label="Show or hide password"
                      >
                        <i class="bi bi-eye"></i>
                      </button>
                    </div>
                  </div>

                  <!-- Confirm Password -->
                  <div class="col-12 col-md-6">
                    <label for="confirmPassword" class="form-label fw-semibold">
                      Confirm Password
                      <span class="text-danger">*</span>
                    </label>

                    <div class="input-group">
                      <input
                        type="password"
                        class="form-control"
                        id="confirmPassword"
                        placeholder="Re-enter your password"
                        required
                      />

                      <button
                        class="btn btn-outline-secondary"
                        type="button"
                        id="toggleConfirmPassword"
                        aria-label="Show or hide confirmed password"
                      >
                        <i class="bi bi-eye"></i>
                      </button>
                    </div>
                  </div>
                </div>

                <!-- Vendor Fields -->
                <section id="vendorFields" class="d-none mt-4">
                  <div class="border rounded p-3 bg-light">
                    <h2 class="h5 fw-bold text-danger mb-3">
                      <i class="bi bi-shop me-2"></i>
                      Vendor Information
                    </h2>

                    <div class="mb-3">
                      <label for="stallName" class="form-label fw-semibold">
                        Stall Name
                        <span class="text-danger">*</span>
                      </label>

                      <input
                        type="text"
                        class="form-control"
                        id="stallName"
                        placeholder="Enter your stall name"
                        maxlength="100"
                      />
                    </div>

                    <div class="mb-0">
                      <label for="hawkerCenter" class="form-label fw-semibold">
                        Hawker Centre
                        <span class="text-danger">*</span>
                      </label>

                      <select class="form-select" id="hawkerCenter">
                        <option value="">Select a hawker centre</option>

                        <option value="Maxwell Food Centre">
                          Maxwell Food Centre
                        </option>

                        <option value="Old Airport Road Food Centre">
                          Old Airport Road Food Centre
                        </option>

                        <option value="Amoy Street Food Centre">
                          Amoy Street Food Centre
                        </option>

                        <option value="Chinatown Complex Food Centre">
                          Chinatown Complex Food Centre
                        </option>
                      </select>
                    </div>
                  </div>
                </section>

                <!-- Terms -->
                <div class="form-check mt-4 mb-4">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="terms"
                    required
                  />

                  <label class="form-check-label" for="terms">
                    I agree to the
                    <a href="#" class="text-danger fw-semibold">
                      Terms &amp; Conditions
                    </a>
                  </label>
                </div>

                <!-- Submit -->
                <div class="d-grid">
                  <button
                    type="submit"
                    class="btn btn-danger btn-lg"
                    id="registerButton"
                  >
                    <i class="bi bi-person-check me-2"></i>
                    Create Account
                  </button>
                </div>
              </form>

              <div class="text-center mt-4">
                <p class="mb-0">
                  Already have an account?

                  <a
                    href="login.html"
                    class="text-danger fw-bold text-decoration-none"
                  >
                    Login here
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-0 small">© 2026 HawkerHub. All rights reserved.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const roleInputs = document.querySelectorAll('input[name="role"]');

      const vendorFields = document.getElementById("vendorFields");

      const stallNameInput = document.getElementById("stallName");

      const hawkerCentreSelect = document.getElementById("hawkerCenter");

      function updateRoleFields() {
        const selectedRole = document.querySelector(
          'input[name="role"]:checked',
        ).value;

        const isVendor = selectedRole === "vendor";

        vendorFields.classList.toggle("d-none", !isVendor);

        stallNameInput.required = isVendor;

        hawkerCentreSelect.required = isVendor;

        if (!isVendor) {
          stallNameInput.value = "";
          hawkerCentreSelect.value = "";
        }
      }

      roleInputs.forEach((radio) => {
        radio.addEventListener("change", updateRoleFields);
      });

      function togglePasswordVisibility(inputId, buttonId) {
        const input = document.getElementById(inputId);

        const button = document.getElementById(buttonId);

        button.addEventListener("click", function () {
          const isPassword = input.type === "password";

          input.type = isPassword ? "text" : "password";

          button.innerHTML = isPassword
            ? '<i class="bi bi-eye-slash"></i>'
            : '<i class="bi bi-eye"></i>';
        });
      }

      togglePasswordVisibility("password", "togglePassword");

      togglePasswordVisibility("confirmPassword", "toggleConfirmPassword");

      document
        .getElementById("registerForm")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          const firstName = document.getElementById("firstName").value.trim();

          const lastName = document.getElementById("lastName").value.trim();

          const email = document
            .getElementById("email")
            .value.trim()
            .toLowerCase();

          const phone = document.getElementById("phone").value.trim();

          const password = document.getElementById("password").value;

          const confirmPassword =
            document.getElementById("confirmPassword").value;

          const role = document.querySelector(
            'input[name="role"]:checked',
          ).value;

          if (!firstName || !lastName || !email) {
            alert("Please complete all required personal information.");

            return;
          }

          if (phone && !/^[689]\d{7}$/.test(phone)) {
            alert("Please enter a valid 8-digit Singapore phone number.");

            return;
          }

          if (password.length < 6) {
            alert("Password must contain at least 6 characters.");

            return;
          }

          if (password !== confirmPassword) {
            alert("Passwords do not match.");

            return;
          }

          const payload = {
            firstName,
            lastName,
            email,
            phone,
            password,
            role,
          };

          if (role === "vendor") {
            const stallName = stallNameInput.value.trim();

            const hawkerCenter = hawkerCentreSelect.value;

            if (!stallName || !hawkerCenter) {
              alert("Please complete the vendor information.");

              return;
            }

            payload.stallName = stallName;
            payload.hawkerCenter = hawkerCenter;
          }

          const registerButton = document.getElementById("registerButton");

          registerButton.disabled = true;

          registerButton.innerHTML = `
              <span
                class="spinner-border spinner-border-sm me-2"
                role="status"
              ></span>
              Creating account...
            `;

          try {
            const response = await fetch("/api/auth/register", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            });

            const data = await response.json();

            if (!response.ok) {
              alert(data.error || "Unable to create account.");

              return;
            }

            // data.user.userId is the unique ID assigned by the database
            localStorage.setItem("hawkerhub_token", data.token);

            localStorage.setItem("hawkerhub_user", JSON.stringify(data.user));

            alert(
              `Registration successful! Your account ID is ${data.user.userId}.`,
            );

            if (role === "customer") {
              window.location.href = "customer-dashboard.html";
            } else {
              window.location.href = "vendor-dashboard.html";
            }
          } catch (error) {
            alert("Unable to reach the server. Please try again.");
          } finally {
            registerButton.disabled = false;

            registerButton.innerHTML = `
                <i class="bi bi-person-check me-2"></i>
                Create Account
              `;
          }
        });

      updateRoleFields();
    </script>
  </body>
</html>
```
